# =============================================================================
# qa.properties  ?  QA ENVIRONMENT OVERRIDES
# =============================================================================


# =============================================================================
# QA ? APPLICATION
# =============================================================================
base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
api.base.url=https://opensource-demo.orangehrmlive.com

username=Admin
password=admin123


# =============================================================================
# QA ? BROWSER
# =============================================================================
#browser=chrome
browser=firefox
headless=false
window.maximize=true

# ?????????????????????????????????????????????????????????????????????????????
# PAGE LOAD STRATEGY
# ?????????????????????????????????????????????????????????????????????????????
page.load.strategy=eager

# Extra Chrome args added on top of the base stability flags in DriverFactory.
# Comma-separated. Add --proxy-server= or other env-specific flags here.
chrome.options=--disable-logging,--log-level=3,--silent

# Extra Firefox args (if browser=firefox)
firefox.options=--disable-blink-features=AutomationControlled


# =============================================================================
# QA ? TIMEOUTS
# =============================================================================
implicit.wait.timeout=10
explicit.wait.timeout=15

# FIX: was 30 ? too tight for the OrangeHRM demo site.
# With eager strategy this is rarely hit, but 60s gives a safe margin.
page.load.timeout=60

fluent.wait.timeout=15
polling.interval=1
script.timeout=30


# =============================================================================
# QA ? RETRY
# =============================================================================
retry.count=3
retry.delay=2000
retry.progressive.delay=true
retry.max.delay=8000


# =============================================================================
# QA ? SCREENSHOTS
# =============================================================================
screenshot.on.failure=true
screenshot.on.success=false
screenshot.on.retry=true
screenshot.cleanup.days=3


# =============================================================================
# QA ? LOGGING
# =============================================================================
log.level=INFO
log.file.path=logs/qa-automation.log


# =============================================================================
# QA ? PARALLEL
# Maven profile also passes -Dparallel.threads=5 which wins over this.
# =============================================================================
parallel.threads=5
thread.timeout=600


# =============================================================================
# QA ? ENVIRONMENT INFO
# =============================================================================
environment=qa
environment.name=Quality Assurance Environment

# =============================================================================
# QA -- TEST DATA
# =============================================================================
test.data.file=testData/testData.json