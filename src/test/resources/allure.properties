# ============================================================
# Allure Report Configuration
# ============================================================

# Directory where Allure writes test result JSON files during the run
allure.results.directory=target/allure-results

# Directory where the generated HTML report is placed
allure.report.directory=target/allure-report

# ============================================================
# CRITICAL FIX: was `true` ? Allure was wiping its own result
# files while tests were still writing to the same directory,
# producing an empty or broken report every time.
# Set to false ? BaseManager.suiteSetup() handles the one-time
# pre-run cleanup instead.
# ============================================================
allure.clean.results.directory=false

# Keep all attachments (screenshots, page source) in the report
allure.report.remove.attachments=false

# Report language
allure.language=en

# ============================================================
# Optional integrations (uncomment when needed)
# ============================================================
# allure.link.issue.pattern=https://your-jira.com/browse/%s
